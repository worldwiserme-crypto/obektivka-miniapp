[phases.setup]
nixPkgs = ["python311", "libreoffice", "poppler_utils"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["which libreoffice || ln -s $(find /nix -name 'soffice' 2>/dev/null | head -1) /usr/local/bin/libreoffice"]

[start]
cmd = "export LO=$(find /nix/store -name 'soffice' -type f 2>/dev/null | head -1) && ln -sf $LO /usr/local/bin/libreoffice && python bot.py"
