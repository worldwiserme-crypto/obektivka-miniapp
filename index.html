<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obektivka Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f5f7fb; color:#1e1e1e; }
    .container { max-width: 720px; margin: 0 auto; padding: 14px; }
    h1 { font-size: 20px; margin: 4px 0 14px; text-align: center; }
    h2 { font-size: 16px; margin: 18px 0 10px; color: #0d47a1; }
    label { display: block; font-size: 13px; margin: 8px 0 4px; font-weight: 600; }
    input, select, textarea, button { width: 100%; font-size: 14px; border-radius: 8px; }
    input, select, textarea { padding: 10px; border: 1px solid #d4d9e2; background: #fff; }
    textarea { min-height: 72px; resize: vertical; }
    .card { background: #fff; border:1px solid #e2e7f0; border-radius: 10px; padding: 12px; margin: 8px 0; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .add { margin-top: 8px; border: 1px dashed #1976d2; color: #1976d2; background: #f0f7ff; padding: 9px; }
    .remove { margin-top: 8px; border: 1px solid #ef9a9a; color: #b71c1c; background: #ffebee; padding: 8px; }
    .submit { margin: 18px 0 24px; border: none; background: #2e7d32; color: #fff; padding: 14px; font-weight: 700; }
    .muted { font-size: 12px; color: #5f6b7a; }
    @media (max-width:600px){ .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>MA'LUMOTNOMA (Obektivka)</h1>
    <p class="muted">Quyidagi ma'lumotlarni rasmiy hujjat uchun to'ldiring.</p>

    <h2>Shaxsiy ma'lumotlar</h2>
    <label>F.I.Sh.</label><input id="full_name" />
    <div class="row">
      <div><label>Tug'ilgan sana</label><input id="birth_date" type="date" /></div>
      <div><label>Tug'ilgan joyi</label><input id="birth_place" /></div>
    </div>
    <div class="row">
      <div><label>Millati</label><input id="nationality" /></div>
      <div><label>Partiyaviyligi</label><select id="party_affiliation"><option>Partiyasiz</option><option>O'zLiDeP</option><option>Milliy tiklanish</option><option>Adolat</option><option>XDP</option><option>Ekologik partiya</option></select></div>
    </div>
    <label>Ma'lumoti</label><textarea id="education"></textarea>
    <label>Ish joyi</label><textarea id="workplace"></textarea>
    <div class="row">
      <div><label>Ilmiy daraja</label><select id="academic_degree"><option>Yo'q</option><option>Bakalavr</option><option>Magistr</option><option>PhD</option><option>Fan nomzodi</option><option>Fan doktori</option></select></div>
      <div><label>Deputatlik holati</label><input id="deputation_status" /></div>
    </div>
    <label>Mukofotlar</label><textarea id="awards"></textarea>
    <label>Doimiy manzil</label><textarea id="address"></textarea>
    <label>Pasport ma'lumotlari</label><textarea id="passport_info"></textarea>
    <label>Telefon raqamlari</label><textarea id="phone_numbers" placeholder="Masalan: +998901234567"></textarea>

    <h2>Tillar</h2>
    <div id="languages_list"></div>
    <button type="button" class="add" id="add_language">+ Til qo'shish</button>

    <h2>Mehnat faoliyati</h2>
    <div id="work_history_list"></div>
    <button type="button" class="add" id="add_work_history">+ Mehnat faoliyati qo'shish</button>

    <h2>Oila a'zolari</h2>
    <div id="family_members_list"></div>
    <button type="button" class="add" id="add_family_member">+ Oila a'zosi qo'shish</button>

    <button type="button" class="submit" id="submit_btn">Yuborish</button>
  </div>

  <script>
    const TG_ID = null;

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function createDynamicCard(containerId, fields) {
      const container = document.getElementById(containerId);
      const card = document.createElement("div");
      card.className = "card";
      fields.forEach((f) => {
        const label = document.createElement("label");
        label.textContent = f.label;
        const input = document.createElement(f.type === "textarea" ? "textarea" : "input");
        input.dataset.key = f.key;
        if (f.type && f.type !== "textarea") input.type = f.type;
        card.appendChild(label);
        card.appendChild(input);
      });
      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "remove";
      removeBtn.textContent = "O'chirish";
      removeBtn.addEventListener("click", () => card.remove());
      card.appendChild(removeBtn);
      container.appendChild(card);
    }

    function collectDynamic(containerId) {
      const items = [];
      const container = document.getElementById(containerId);
      container.querySelectorAll(".card").forEach((card) => {
        const item = {};
        card.querySelectorAll("input, textarea").forEach((el) => {
          item[el.dataset.key] = el.value.trim();
        });
        items.push(item);
      });
      return items;
    }

    document.getElementById("add_language").addEventListener("click", () => {
      createDynamicCard("languages_list", [{ label: "Til", key: "name", type: "text" }, { label: "Darajasi", key: "level", type: "text" }]);
    });

    document.getElementById("add_work_history").addEventListener("click", () => {
      createDynamicCard("work_history_list", [
        { label: "Davr (masalan 2018-2022)", key: "period", type: "text" },
        { label: "Tashkilot", key: "organization", type: "text" },
        { label: "Lavozim", key: "position", type: "text" }
      ]);
    });

    document.getElementById("add_family_member").addEventListener("click", () => {
      createDynamicCard("family_members_list", [
        { label: "Qarindoshligi", key: "relation", type: "text" },
        { label: "F.I.Sh.", key: "full_name", type: "text" },
        { label: "Tug'ilgan yili va joyi", key: "birth_info", type: "text" },
        { label: "Ish joyi va lavozimi", key: "workplace", type: "text" },
        { label: "Yashash manzili", key: "address", type: "textarea" }
      ]);
    });

    document.getElementById("add_language").click();
    document.getElementById("add_work_history").click();
    document.getElementById("add_family_member").click();

    document.getElementById("submit_btn").addEventListener("click", async () => {
      if (TG_ID === null) {
        alert("Telegram foydalanuvchi ID topilmadi");
        return;
      }

      const payload = {
        tg_id: Number(TG_ID),
        data: {
          full_name: document.getElementById("full_name").value.trim(),
          birth_date: document.getElementById("birth_date").value,
          birth_place: document.getElementById("birth_place").value.trim(),
          nationality: document.getElementById("nationality").value.trim(),
          party_affiliation: document.getElementById("party_affiliation").value,
          education: document.getElementById("education").value.trim(),
          workplace: document.getElementById("workplace").value.trim(),
          academic_degree: document.getElementById("academic_degree").value,
          awards: document.getElementById("awards").value.trim(),
          deputation_status: document.getElementById("deputation_status").value.trim(),
          address: document.getElementById("address").value.trim(),
          passport_info: document.getElementById("passport_info").value.trim(),
          phone_numbers: document.getElementById("phone_numbers").value.trim(),
          languages: collectDynamic("languages_list"),
          work_history: collectDynamic("work_history_list"),
          family_members: collectDynamic("family_members_list")
        }
      };

      const btn = document.getElementById("submit_btn");
      btn.disabled = true;
      btn.textContent = "Yuborilmoqda...";

      try {
        const response = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (result.ok) {
          alert("Ma'lumot yuborildi. Hujjat Telegram orqali yuboriladi.");
          tg.close();
        } else {
          alert("Xatolik: " + (result.error || "Noma'lum xato"));
        }
      } catch (err) {
        alert("So'rov muvaffaqiyatsiz: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Yuborish";
      }
    });
  </script>
</body>
</html>
